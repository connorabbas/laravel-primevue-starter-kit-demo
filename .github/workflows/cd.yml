name: CD

# TODO: Look into auto-pruning containers from registry and the host VPS

on:
  pull_request:
    types:
      - closed
    branches:
      - main
      - master

concurrency:
  group: production-swarm
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  IMAGE_REPOSITORY: ghcr.io/${{ github.repository }}
  IMAGE_TAG: ${{ github.event.pull_request.merge_commit_sha }}

jobs:
  build-image:
    # `pull_request.closed` fires for both merged and manually closed PRs.
    # Only deploy when the PR was actually merged.
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ env.IMAGE_TAG }}

      - name: Build and push image
        uses: serversideup/github-action-docker-build@v6
        with:
          tags: |
            ${{ env.IMAGE_REPOSITORY }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_REPOSITORY }}:latest
          registry: ghcr.io
          registry-username: ${{ github.repository_owner }}
          registry-password: ${{ secrets.GITHUB_TOKEN }}
          dockerfile: ./Dockerfile
          target: ssr-release
          platforms: linux/amd64

  deploy:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    needs: build-image

    steps:
      - name: Deploy stack to Docker Swarm
        uses: serversideup/github-action-docker-swarm-deploy@v3
        with:
          stack_name: ${{ secrets.SWARM_STACK_NAME }}
          docker_compose_file_path: '-c docker-compose-swarm.yml'
          ssh_deploy_private_key: ${{ secrets.SSH_DEPLOY_PRIVATE_KEY }}
          ssh_deploy_user: ${{ secrets.SSH_DEPLOY_USER }}
          ssh_remote_hostname: ${{ secrets.SSH_REMOTE_HOSTNAME }}
          ssh_remote_port: '22'
          ssh_remote_known_hosts: ${{ secrets.SSH_REMOTE_KNOWN_HOSTS }}
          registry: ghcr.io
          registry-username: ${{ github.repository_owner }}
          registry-token: ${{ secrets.GITHUB_TOKEN }}
          env_file_base64: ${{ secrets.PRODUCTION_ENV_FILE_BASE64 }}

  prune-docker-host:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest
    needs: deploy

    steps:
      - name: Prune unused Docker images on VPS
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SSH_REMOTE_HOSTNAME }}
          username: ${{ secrets.SSH_DEPLOY_USER }}
          key: ${{ secrets.SSH_DEPLOY_PRIVATE_KEY }}
          port: 22
          script: |
            docker image prune -af
          # Alternative (more aggressive):
          # docker system prune -af --volumes
